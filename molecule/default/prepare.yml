---
- name: Prepare
  hosts: all
  become: true
  gather_facts: false

  pre_tasks:
    - name: Install sudo if missing
      ansible.builtin.raw: "{{ ansible_pkg_mgr | default('dnf') }} install -y sudo"
      become: false
      changed_when: false
      failed_when: false

    - name: Configure passwordless sudo
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        state: present
        regexp: '^%wheel'
        line: '%wheel ALL=(ALL) NOPASSWD: ALL'
        validate: 'visudo -cf %s'
      become: true

    - name: Install Debian/Ubuntu GPG keys if missing
      ansible.builtin.raw: |
        if [ -f /etc/debian_version ]; then
          apt-get update -y 2>/dev/null | grep -q 'NO_PUBKEY' && \
            apt-get install -y debian-archive-keyring ubuntu-archive-keyring 2>/dev/null || true
        fi
      become: false
      changed_when: false
      failed_when: false

    - name: Install Elastic GPG key on Debian/Ubuntu
      ansible.builtin.raw: |
        if [ -f /etc/debian_version ]; then
          curl -fsSL https://artifacts.elastic.co/GPG-KEY-elasticsearch | apt-key add - 2>/dev/null || true
        fi
      become: false
      changed_when: false
      failed_when: false

  roles:
    - role: buluma.bootstrap
    - role: buluma.core_dependencies
    - role: robertdebock.elastic_repo
