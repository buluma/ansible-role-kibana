---
# Pins the CI platform/version matrix for this role. Without this, ansible-generator
# falls back to default_platforms and silently discards these choices on regenerate.
platforms:
  - name: EL
    versions:
      - "10"
      - "9"
  - name: Debian
    versions:
      # Excludes 13: the third-party robertdebock.elastic_repo dependency
      # still uses ansible.builtin.apt_key, which trixie removed entirely
      # ("Failed to find required executable apt-key"). Its current
      # upstream HEAD hasn't been updated for this yet.
      - "12"
      - "11"
  # Fedora excluded entirely: Elastic's official repo doesn't publish
  # kibana packages for Fedora ("No package kibana available").
  - name: Ubuntu
    versions:
      # Excludes 26.04 (resolute): same apt_key removal as Debian 13.
      - "24.04"
      - "22.04"
